<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>API Guard — Lightweight API Monitoring & Analytics Platform</title>
    <meta name="description" content="Track every API hit, monitor latency, analyze error rates, and manage multi-tenant environments. Lightweight alternative to Grafana for API monitoring." />
    <meta name="keywords" content="API monitoring, API analytics, API performance monitoring, API uptime, API observability, lightweight Grafana alternative" />
    <meta name="author" content="API Guard" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="API Guard — Lightweight API Monitoring & Analytics" />
    <meta property="og:description" content="Real-time API hit tracking, latency analytics, error rate dashboards, and multi-tenant management in one platform." />
    <meta property="og:site_name" content="API Guard" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="API Guard — Lightweight API Monitoring" />
    <meta name="twitter:description" content="Track every API hit. Spot issues before users do. Real-time monitoring with zero complexity." />

    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "API Guard",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "description": "Lightweight API monitoring and analytics platform for modern teams. Track hits, latency, error rates, and manage multi-tenant environments.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Prevent FOUC for dark/light theme -->
    <script>
      (function() {
        var theme = localStorage.getItem('api-guard-theme');
        if (theme === 'light') {
          document.documentElement.classList.add('light');
        } else if (!theme && window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.documentElement.classList.add('light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
