version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: api_guard_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pratham
      POSTGRES_DB: api_guard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.postgres.sql:/docker-entrypoint-initdb.d/init.postgres.sql
    networks:
      - api_guard_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5  

  mongodb:
    image: mongo:7
    container_name: api_guard_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - api_guard_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5       

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: api_guard_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: api_guard
      RABBITMQ_DEFAULT_PASS: api_guard_secret
      RABBITMQ_DEFAULT_VHOST: api_guard_vhost
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - api_guard_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 15s
      timeout: 10s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: api_guard_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - api_guard_network
    depends_on:
      - postgres

  api_guard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_guard_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # MongoDB (local container)
      MONGO_URI: mongodb://mongodb:27017/api_guard
      MONGO_DB_NAME: api_guard
      # PostgreSQL (Docker container)
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: api_guard
      PG_USER: postgres
      PG_PASSWORD: pratham
      # RabbitMQ (Docker container)
      RABBITMQ_URL: amqp://api_guard:api_guard_secret@rabbitmq:5672/api_guard_vhost
      RABBITMQ_QUEUE: api_hits
      # Security
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - api_guard_network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api_guard_consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: api_guard_consumer
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      # MongoDB (local container)
      MONGO_URI: mongodb://mongodb:27017/api_guard
      MONGO_DB_NAME: api_guard
      # PostgreSQL (Docker container)
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: api_guard
      PG_USER: postgres
      PG_PASSWORD: pratham
      # RabbitMQ (Docker container)
      RABBITMQ_URL: amqp://api_guard:api_guard_secret@rabbitmq:5672/api_guard_vhost
      RABBITMQ_QUEUE: api_hits
      # Security
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - api_guard_network
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  mongo_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  api_guard_network:
    driver: bridge